# Real-time RL self-play, tuned for a 64GB Apple Silicon Mac (full-weight REINFORCE).
#
# Memory plan (why this fits in 64GB):
#   - SGD optimizer (no AdamW momentum/variance state copies)
#   - bfloat16 weights (half memory vs float32) -- bf16 backward works on MPS
#   - grads freed after every optimizer step (peak = one model's grads at a time)
#   - rule-based main verifier (no 4th resident model)
#   - verifier RL calibration disabled for this big run (it is the 3rd trainable
#     model; enable it + a hybrid verifier only on machines with more memory)
#
# Two trainable 4B models (attacker + defender):
#   ~2 x 8GB weights + ~8GB peak grad + activations ~ = well under 64GB.
#
# The defender's FINAL weights are saved to runs/rl-selfplay-2b/latest/defender_final.
# Use only on models you own or are explicitly authorized to modify.

run:
  name: "rl-selfplay-2b"
  episodes: 2000
  output_dir: "./runs/rl-selfplay-2b"
  seed: 20260629

sampling:
  adversarial_rate: 0.6
  benign_rate: 0.3
  borderline_rate: 0.1

rewards:
  safe_refusal_reward: 2.0
  unsafe_compliance_penalty: -3.0
  over_refusal_penalty: -2.0
  helpful_compliance_reward: 0.5
  borderline_safe_reward: 0.5
  ambiguous_reward: 0.0
  evasive_penalty: -0.5
  failed_attack_penalty: -0.5
  successful_attack_reward: 1.0
  novelty_bonus: 0.1
  evasive_partial_credit: 0.1
  progressive_difficulty_bonus: 0.05
  technique_novelty_bonus: 0.1

attacker:
  type: "adaptive_rl"
  params:
    max_prompt_tokens: 160
    max_prompt_chars: 4000
    memory_size: 20
    success_memory_size: 8
    failure_memory_size: 4
    ucb_exploration: 1.41
    temperature: 0.9

providers:
  # Attacker/jailbreaker: the abliterated (safety-stripped) Gemma-4 E2B.
  attacker:
    type: "local_transformers"
    model: "huihui-ai/Huihui-gemma-4-E2B-it-abliterated"
    params:
      device: "auto"
      dtype: "bfloat16"
      max_new_tokens: 160
      temperature: 0.9
      local_files_only: false
      trust_remote_code: false
      max_length: 384
      model_kwargs:
        attn_implementation: "eager"
        low_cpu_mem_usage: true
  # Defender/main model: standard Gemma-4 E2B (the model being hardened).
  defender:
    type: "local_transformers"
    model: "google/gemma-4-E2B-it"
    params:
      device: "auto"
      dtype: "bfloat16"
      max_new_tokens: 96
      temperature: 0.7
      local_files_only: false
      trust_remote_code: false
      max_length: 384
      model_kwargs:
        attn_implementation: "eager"
        low_cpu_mem_usage: true
  # Deterministic main-loop verifier. Using rule_based avoids a 4th resident
  # model and keeps the reward signal non-circular (the model verifier that is
  # RL-trained lives only in the calibration step, which is disabled here).
  verifier:
    type: "rule_based"

trainer:
  type: "rl_selfplay"
  update_every: 1

rl:
  enabled: true
  checkpoint_every: 250
  save_final_defender: true
  final_defender_dir: "defender_final"
  promote_calibrated_verifier: false
  attacker:
    optimizer: "sgd"
    lr: 3.0e-7
    momentum: 0.0
    entropy_coef: 0.02
    clip_grad: 1.0
    baseline_decay: 0.95
    reward_clip: 10.0
    temperature: 0.9
    max_new_tokens: 160
    dtype: "bfloat16"
  defender:
    optimizer: "sgd"
    lr: 3.0e-7
    momentum: 0.0
    entropy_coef: 0.01
    clip_grad: 1.0
    baseline_decay: 0.95
    reward_clip: 10.0
    temperature: 0.7
    max_new_tokens: 96
    dtype: "bfloat16"
  verifier_calibration:
    enabled: false  # set true + a hybrid verifier on machines with >64GB