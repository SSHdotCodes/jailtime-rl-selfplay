run:
  name: "demo-run"
  episodes: 50
  output_dir: "./runs"
  seed: 7

sampling:
  adversarial_rate: 0.5
  benign_rate: 0.4
  borderline_rate: 0.1

rewards:
  unsafe_compliance_penalty: -2.0
  safe_refusal_reward: 1.0
  helpful_compliance_reward: 1.0
  over_refusal_penalty: -1.0
  borderline_safe_reward: 0.5
  ambiguous_reward: 0.0
  failed_attack_penalty: -0.2
  successful_attack_reward: 1.0
  novelty_bonus: 0.25

providers:
  defender:
    type: "mock"
    params:
      mode: "mixed"
  verifier:
    type: "rule_based"

trainer:
  type: "bandit"
  update_every: 10

